name: Build and Release
on:
  push:
    tags:
      - '*'
jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install pipenv
        run: pip install pipenv
      - name: Install dependencies
        run: pipenv install --dev
      - name: Build with PyInstaller
        run: pipenv run pyinstaller --onefile --windowed --name PyPdf2Imgs --add-data "spinner.gif:." main.py

      - name: Zip artifact
        uses: thedoctor0/zip-release@0.7.6
        with:
          directory: dist
          filename: "PyPdf2Imgs-macos.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PyPdf2Imgs-macos
          path: dist/PyPdf2Imgs-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install pipenv
        run: pip install pipenv
      - name: Install dependencies
        run: pipenv install --dev
      - name: Build with PyInstaller
        run: pipenv run pyinstaller --onefile --windowed --name PyPdf2Imgs --add-data "spinner.gif;." main.py

      - name: Zip artifact
        uses: thedoctor0/zip-release@0.7.6
        with:
          directory: dist
          filename: "PyPdf2Imgs-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PyPdf2Imgs-windows
          path: dist/PyPdf2Imgs-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install pipenv
        run: pip install pipenv
      - name: Install dependencies
        run: pipenv install --dev
      - name: Build with PyInstaller
        run: pipenv run pyinstaller --onefile --windowed --name PyPdf2Imgs --add-data "spinner.gif:." main.py

      - name: Zip artifact
        uses: thedoctor0/zip-release@0.7.6
        with:
          directory: dist
          filename: "PyPdf2Imgs-linux.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PyPdf2Imgs-linux
          path: dist/PyPdf2Imgs-linux.zip

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Changelog Entry
        id: changelog_reader
        uses: mindsers/changelog-reader-action@v2
        with:
          validation_level: warn

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      # Create a release for this specific version
      - name: Update Release with Files
        id: create_version_release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: Release ${{ steps.changelog_reader.outputs.version }}
          draft: true
          artifacts: "dist/*.zip"
          tag: ${{ steps.changelog_reader.outputs.version }}
          body: ${{ steps.changelog_reader.outputs.changes }}
