name: Build and Release
on:
  push:
    tags:
      - '*'
jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.13'
      - name: Install pipenv
        run: pip install pipenv
      - name: Install dependencies
        run: pipenv install --dev
      - name: Build with PyInstaller
        # onedir, not onefile: PyInstaller deprecates --onefile combined with
        # --windowed .app bundles on macOS (a .app can't be a single file) and
        # will make it a hard error in v7.0.
        run: pipenv run pyinstaller --windowed --name PyPdf2Imgs --add-data "spinner.gif:." main.py
      - name: Remove redundant loose build
        # --windowed on macOS produces both a bare dist/PyPdf2Imgs/ onedir
        # folder and a .app bundle wrapping its own copy of the same contents.
        # Only the .app is meant to be distributed; drop the loose one so the
        # zip isn't doubled up.
        run: rm -rf dist/PyPdf2Imgs

      - name: Zip artifact
        uses: thedoctor0/zip-release@0.7.6
        with:
          directory: dist
          filename: "PyPdf2Imgs-macos.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: PyPdf2Imgs-macos
          path: dist/PyPdf2Imgs-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.13'
      - name: Install pipenv
        run: pip install pipenv
      - name: Install dependencies
        run: pipenv install --dev
      - name: Build with PyInstaller
        run: pipenv run pyinstaller --onefile --windowed --name PyPdf2Imgs --add-data "spinner.gif;." main.py

      - name: Zip artifact
        uses: thedoctor0/zip-release@0.7.6
        with:
          directory: dist
          filename: "PyPdf2Imgs-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: PyPdf2Imgs-windows
          path: dist/PyPdf2Imgs-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.13'
      - name: Install pipenv
        run: pip install pipenv
      - name: Install dependencies
        run: pipenv install --dev
      - name: Build with PyInstaller
        run: pipenv run pyinstaller --onefile --windowed --name PyPdf2Imgs --add-data "spinner.gif:." main.py

      - name: Zip artifact
        uses: thedoctor0/zip-release@0.7.6
        with:
          directory: dist
          filename: "PyPdf2Imgs-linux.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: PyPdf2Imgs-linux
          path: dist/PyPdf2Imgs-linux.zip

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Get Changelog Entry
        id: changelog_reader
        uses: mindsers/changelog-reader-action@v2
        with:
          validation_level: warn

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      # Create a release for this specific version
      - name: Update Release with Files
        id: create_version_release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: Release ${{ steps.changelog_reader.outputs.version }}
          draft: true
          artifacts: "dist/*.zip"
          tag: ${{ steps.changelog_reader.outputs.version }}
          body: ${{ steps.changelog_reader.outputs.changes }}
